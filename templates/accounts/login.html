{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 0 auto;" class="glass-panel">
    <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: red; font-size: 0.8rem; margin-top: 0.3rem;">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">New to Jobify? <a href="{% url 'accounts:register' %}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign Up</a></p>
</div>
{% endblock %}
